name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/yevgenio/gallery-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Checkout homelab-cluster repo
        uses: actions/checkout@v4
        with:
          repository: Yevgenio/homelab-cluster
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/tag: \"[^\"]*\"/tag: \"$SHORT_SHA\"/" manifests/gallery-frontend/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifests/gallery-frontend/values.yaml
          git commit -m "deploy: gallery-frontend $SHORT_SHA"
          git push
